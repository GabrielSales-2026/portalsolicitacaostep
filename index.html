<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal de Solicitação Interna</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #1f3b73 0%, #0f172a 45%, #020617 100%);
      color: #e5e7eb;
      overflow-y: auto; /* ✅ SCROLL LIBERADO */
      padding: 20px;
    }

    .bg-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.18);
      filter: blur(80px);
      top: 10%;
      left: 10%;
      pointer-events: none;
    }

    .bg-glow-2 {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.14);
      filter: blur(80px);
      bottom: 8%;
      right: 10%;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 720px;
      margin: 40px auto; /* ✅ CENTRALIZA COM SCROLL */
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 24px;
      padding: 34px 28px 38px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.30);
      color: #bfdbfe;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .question-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
    }

    .question {
      font-size: 26px;
      font-weight: bold;
    }

    .button-area {
      margin-top: 30px;
      position: relative;
      height: 180px;
    }

    button {
      border: none;
      padding: 14px 26px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      position: absolute;
    }

    #btnSim {
      left: 30%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #22c55e;
      color: white;
    }

    #btnNao {
      left: 70%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #ef4444;
      color: white;
    }

    .result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #86efac;
    }

    .attempts {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow-2"></div>

<div class="card">

  <div class="tag">PORTAL INTERNO - CONFIDENCIAL</div>

  <h1>Análise de viabilidade</h1>

  <p class="subtitle">
    Após análise técnica e operacional, identificou-se uma necessidade clara de ajuste salarial.
  </p>

  <div class="question-box">
    <p class="question">Chefe, aceita me dar um aumento?</p>
  </div>

  <div class="button-area" id="area">
    <button id="btnSim">Sim</button>
    <button id="btnNao">Não</button>
  </div>

  <div class="attempts" id="contador"></div>
  <div class="result" id="resultado"></div>

</div>

<script>
const btnNao = document.getElementById("btnNao");
const btnSim = document.getElementById("btnSim");
const contador = document.getElementById("contador");
const resultado = document.getElementById("resultado");
const area = document.getElementById("area");

let tentativas = 0;

function mover() {
  const maxX = area.clientWidth - btnNao.offsetWidth;
  const maxY = area.clientHeight - btnNao.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btnNao.style.left = x + "px";
  btnNao.style.top = y + "px";

  tentativas++;

  contador.innerText = "Tentativas de negar: " + tentativas;

  if (tentativas > 5) btnNao.innerText = "Tem certeza?";
  if (tentativas > 10) btnNao.innerText = "Pensa melhor...";
  if (tentativas > 15) btnNao.innerText = "Resposta inválida";

  btnSim.style.transform = `translate(-50%, -50%) scale(${1 + tentativas*0.02})`;
}

btnNao.addEventListener("mouseover", mover);

document.addEventListener("mousemove", (e) => {
  const rect = btnNao.getBoundingClientRect();
  const dx = Math.abs(e.clientX - rect.left);
  const dy = Math.abs(e.clientY - rect.top);

  if (dx < 100 && dy < 60) mover();
});

btnSim.addEventListener("click", () => {
  resultado.innerHTML = "✔ Solicitação aprovada com sucesso";
});
</script>

</body>
</html>
